replicaCount: 3

imagePullSecrets:
  - name: nexus-registry

podAnnotations: {}

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: workload
              operator: In
              values:
                - general
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: app
        topologyKey: kubernetes.io/hostname

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: app

image:
  repository: "51.178.52.51:8019/sample-app"
  tag: "latest"
  pullPolicy: Always

app:
  env:
    APP_ENV: "production"
    APP_DEBUG: "false"
    APP_URL: "http://app.kubequest.local"

secrets:
  existingSecret: app-secrets
  keys:
    appKey: APP_KEY
    dbPassword: DB_PASSWORD

database:
  connection: mysql
  host: mysql
  port: 3306
  name: app_database
  username: app_user

containerPort: 80

service:
  type: ClusterIP
  port: 80

ingressRoute:
  host: app.kubequest.local

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  startup:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 18
  liveness:
    path: /healthz
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /readyz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 6

podDisruptionBudget:
  enabled: true
  minAvailable: 2

migrationJob:
  enabled: true
  backoffLimit: 6
  ttlSecondsAfterFinished: 300
