apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.app.env.APP_ENV | quote }}
  APP_DEBUG: {{ .Values.app.env.APP_DEBUG | quote }}
  APP_URL: {{ .Values.app.env.APP_URL | quote }}
  DB_CONNECTION: {{ .Values.database.connection | quote }}
  DB_HOST: {{ .Values.database.host | quote }}
  DB_PORT: {{ .Values.database.port | toString | quote }}
  DB_DATABASE: {{ .Values.database.name | quote }}
  DB_USERNAME: {{ .Values.database.username | quote }}
