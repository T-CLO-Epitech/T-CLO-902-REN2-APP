on:
  pull_request:

jobs:
  lint:
    name: 🧪 Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0
      - name: Lint all charts
        run: |
          helm lint sample-app-master/helm/app --strict

  unittest:
    name: ✅ Helm Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest

      - name: Run helm-unittest on all charts
        run: |
          helm unittest sample-app-master/helm/app

  docker:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: unittest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Allow insecure registry
        run: |
          sudo tee /etc/docker/daemon.json <<EOF
          { "insecure-registries": ["51.178.52.51:8018"] }
          EOF
          sudo systemctl restart docker

      - name: Login to Nexus Registry
        run: |
          echo "${{ secrets.NEXUS_PASSWORD }}" | docker login 51.178.52.51:8018 -u "${{ secrets.NEXUS_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t 51.178.52.51:8018/sample-app:${{ github.sha }} sample-app-master/

      - name: Push Docker image
        run: |
          docker push 51.178.52.51:8018/sample-app:${{ github.sha }}